<div id="carouselExampleControlsNoTouching" class="carousel slide" data-bs-touch="false">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img
        ngSrc="images/carousel/Otori.webp"
        class="d-flex justify-content-center"
        alt="Emu Otori chibi"
        fill
      />
    </div>
    <div class="carousel-item">
      <img
        ngSrc="images/carousel/img_illust_mikuv6.webp"
        class="d-flex justify-content-center"
        alt="Hatsune Miku V6"
        fill
      />
    </div>
    <div class="carousel-item">
      <img
        ngSrc="images/carousel/PADORU with text.png"
        class="d-flex justify-content-center"
        alt="PADORU PADORU"
        fill
      />
    </div>
    <div class="carousel-item">
      <img
        ngSrc="images/carousel/Job-Application.webp"
        class="d-flex justify-content-center"
        alt="Job Application"
        fill
      />
    </div>
  </div>
  <button
    class="carousel-control-prev align-items-end"
    type="button"
    data-bs-target="#carouselExampleControlsNoTouching"
    data-bs-slide="prev"
  >
    <div class="custom-arrow">
      <img ngSrc="images/Uzi.png" height="300" width="300" alt="Uzi" />
    </div>
    <span class="visually-hidden">Previous</span>
  </button>
  <button
    class="carousel-control-next align-items-end"
    type="button"
    data-bs-target="#carouselExampleControlsNoTouching"
    data-bs-slide="next"
  >
    <div class="custom-arrow">
      <img ngSrc="images/N.png" height="300" width="300" alt="N" />
    </div>
    <span class="visually-hidden">Next</span>
  </button>
</div>
